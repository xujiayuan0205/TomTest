# 本地 vLLM：LoRA 合并/全量权重目录 + GPU 3（CUDA_VISIBLE_DEVICES=3）
# 远端直连时改 llm/judge 的 api_url 即可
llm:
  model_name: Qwen3-8B-LoRASIPWithSelfCoT
  api_key: EMPTY
  api_url: http://127.0.0.1:8000/v1
  temperature: 0.6
  max_tokens: 8196
  max_workers: 96
  enable_thinking: true
  system_prompt: ""

judge:
  model_name: Qwen3-8B-LoRASIPWithSelfCoT
  api_key: EMPTY
  api_url: http://127.0.0.1:8000/v1
  temperature: 0.0
  max_tokens: 4096
  system_prompt: ""
  enable_thinking: false
  use_llm_judge: false

vllm:
  gpu_index: 3
  sigterm_gpu_vllm_processes: true
  extra_stop_command: |
    pkill -f 'vllm.entrypoints.openai.api_server' || true
  sleep_sec_after_stop: 20
  wait_min_free_gpu_mib: 28000
  wait_gpu_timeout_sec: 180
  start_commands:
    Qwen3-8B-LoRASIPWithSelfCoT: |
      CUDA_VISIBLE_DEVICES=3 /DATA/xujy/miniconda3/envs/tomtest/bin/python -m vllm.entrypoints.openai.api_server \
        --model /DATA/xujy/models/Qwen3-8B-LoRASIPWithSelfCoT \
        --trust-remote-code \
        --reasoning-parser qwen3 \
        --host 0.0.0.0 --port 8000 \
        --served-model-name Qwen3-8B-LoRASIPWithSelfCoT \
        --gpu-memory-utilization 0.85 \
        --disable-uvicorn-access-log \
        --no-enable-log-requests

repeats: 1
max_samples: 100
datasets_path: datasets
results_path: results
