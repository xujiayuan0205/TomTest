# 本地 vLLM：与 scripts/run_five_local_models_tombench_tomato.sh 中 served 名一致
llm:
  model_name: Qwen3-0.6B
  api_key: not-needed
  api_url: http://127.0.0.1:8006/v1
  temperature: 0.6
  max_tokens: 8192
  max_workers: 64
  enable_thinking: true

judge:
  model_name: Qwen3-0.6B
  api_key: not-needed
  api_url: http://127.0.0.1:8006/v1
  temperature: 0.0
  max_tokens: 4096
  system_prompt: ""
  enable_thinking: false
  use_llm_judge: true

badcase:
  enabled: true

repeats: 3
max_samples: 0
datasets_path: datasets
results_path: results/Qwen3-0.6B
