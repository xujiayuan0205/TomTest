llm:
  model_name: Qwen3-8B-SIPColdStart
  api_key: EMPTY
  api_url: http://10.208.62.37:31727/v1
  temperature: 0.6
  max_tokens: 8192
  max_workers: 64
  enable_thinking: true
  system_prompt: |
    Write your thinking process inside <think></think> tags, then output the answer in JSON format: {
            "final_answer": "final answer",
            "reasoning_to_answer": "reasoning"
        }
  response_mode: final_answer_json
  answer_extractor: json_final_answer
  answer_normalizer: identity

judge:
  model_name: Qwen3-8B-SIPColdStart
  api_key: EMPTY
  api_url: http://10.208.62.37:31727/v1
  temperature: 0.0
  max_tokens: 4096
  system_prompt: ""
  enable_thinking: false
  use_llm_judge: true

badcase:
  enabled: true

evaluation:
  prompt_profile: cot_tags_v1
  extraction_profile: cot_tags_v1
  overrides:
    ToMi:
      prompt_profile: cot_tags_tomi_v1

repeats: 3
max_samples: 0
datasets_path: datasets
results_path: results/Qwen3-8B-SIPColdStart
